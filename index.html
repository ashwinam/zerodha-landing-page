<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerodha</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav>
        <!-- nav element is a semantic elements -->
         <div id="nav-container">
            <div class="logo">
                <img src="https://zerodha.com/static/images/logo.svg" alt="zerodha logo" width="200px"/>
            </div>
            <div class="nav-menu">
                <ul>
                    <li>SignUp</li>
                    <li>About</li>
                    <li>Products</li>
                    <li>Pricing</li>
                    <li>Support</li>
                </ul>
                <div class="hamburger-menu">&#9776;</div>
            </div>
         </div>
    </nav>

    <section>
        <!-- Section is a semantic element -->
         <div class="hero-image">
            <img src="https://zerodha.com/static/images/landing.svg" alt="landing image" />
         </div>

    </section>

    <section>
        <div class="hero-text">
            <div class="header">
                <h2>Invest in Everything</h2>
            </div>
            <div class="text">
                <p>Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</p>
            </div>
        </div>
        <div class="cta">
            <button class="cta-btn">Sign up for free</button>
        </div>
    </section>
</body>
</html>
